services:
  # VidyaRaksha Web Service (Backend + Frontend)
  - type: web
    name: vidyaraksha-service
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn --chdir backend --bind 0.0.0.0:5000 'app:create_app(\"production\")'"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vidyaraksha-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MODEL_PATH
        value: backend/ml/trained_model.pkl
      - key: SCALER_PATH
        value: backend/ml/scaler.pkl

databases:
  # VidyaRaksha PostgreSQL Database
  - name: vidyaraksha-db
    databaseName: vidyaraksha
    user: vidyaraksha_admin
    plan: free
    region: singapore
